context:
  version: "1.2.3"
  python_min: "3.10"

package:
  name: cucopy
  version: ${{ version }}

source:
- url: https://github.com/FZJ-IEK3-VSA/CuCoPy/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1e0de21a70100b828120d2d78048721ae289768d4466128786b839b9bf35c78b

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools
  - pip
  run:
  - python >=${{ python_min }}
  - pyyaml >=6.0
  - sdmx1 >=2.23.1
  - joblib >=1.3.2

tests:
- script:
    - pytest -vvv
  requirements:
      run:
        - pytest
        - python ${{ python_min }}.*
  files:
      source:
        - .

about:
  homepage: https://github.com/FZJ-IEK3-VSA/CuCoPy
  summary: Module for exchanging monetary values and inflation adjustment.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
