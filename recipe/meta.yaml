{% set name = "cucopy" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cucopy-{{ version }}.tar.gz
  sha256: 471353e2600f5ab24b45427c7b8bfaa2b009b5bf4af12a484e69eb3f92d98018

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=61.0
    - wheel
    - setuptools-git
    - pip
  run:
    - python >=3.8
    - pandas

test:
  imports:
    - cucopy
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://jugit.fz-juelich.de/iek-3/groups/data-and-model-integration/cucopy
  summary: The CuCoPy package provides methods for exchanging currencies and adjusting monetary values for inflation until 1960 on a yearly basis.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
