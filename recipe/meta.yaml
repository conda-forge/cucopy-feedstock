context:
  version: "1.2.5"
  python_min: "3.10"
  
package:
  name: cucopy
  version: ${{ version }}

source:
  url: https://github.com/FZJ-IEK3-VSA/CuCoPy/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 65ef166f838b808fa1128215ccfe6b6c5ba58890dcfad47f2aac179f9517e243

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools
  - pip
  run:
  - python >=${{ python_min }}
  - pyyaml >=6.0
  - sdmx1 >=2.23.1
  - joblib >=1.3.2

tests:
- script:
    - pytest -vvv
  requirements:
      run:
        - pytest
        - python ${{ python_min }}.*
  files:
      source:
        - .

about:
  homepage: https://github.com/FZJ-IEK3-VSA/CuCoPy
  summary: Module for exchanging monetary values and inflation adjustment.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
